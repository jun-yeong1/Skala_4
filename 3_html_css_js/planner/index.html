<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skala_html_Day1</title>
</head>
<body>
    <h1>SKALA 스터디 플래너</h1>
    <h2>학습 목표 추가</h2>
    <p>웹 서비스 개발은 흥미롭고 보람 있는 경험입니다.<br>HTML은 그 시작입니다.</p>
    <hr>
    <p>이 문장은 수평선 아래에 나타납니다.</p>

    <div>첫번째 DIV 영역</div> <div>두번째 DIV 영역</div>     <!-- 블록 요소이기에 줄 변경됨 -->
    <hr>

    <span>#1번 SPAN 구역</span> <span>#2번 SPAN 구역</span> <!-- 인라인 요소이기에 줄 변경안됨 -->
    <ul>                                                 <!-- 순서 없는 목록 -->
        <li>HTML</li>
        <li>CSS</li>
    </ul>

    <ol type="A" start="1">                             <!-- 순서 있는 목록: A, B, C -->
        <li>첫 번째 항목</li>
    </ol>
    <dl>                                                <!-- 정의형 목록 -->
        <dt>HTML</dt>
        <dd>웹 페이지를 만드는 데 사용되는 마크업 언어입니다.</dd>
    </dl>
    <hr> <br>

    <!-- 테이블 예제 -->
    <table>
        <thead>
            <tr><th>이름</th><th>나이</th></tr>
        </thead>
        <tbody>
            <tr><td>홍길동</td><td>30</td></tr>
        </tbody>
    </table>
    <table border="1">
    <tr>
        <th rowspan="2">이름</th> <!-- 두 행을 세로로 합침 -->
        <th>나이</th><th>직업</th>
    </tr>
    <tr>
        <td colspan="2">정보 없음</td> <!-- 두 열을 가로로 합침 -->
    </tr>
    </table> <br>
    <table>
        <caption>2일 학습 진도표</caption> <!-- 표의 제목 -->
        <thead>
            <tr><th scope="col">일차</th><th scope="col">주제</th></tr>
        </thead>
        <tbody>
            <tr><th scope="row">1일차</th><td>HTML · CSS</td></tr>
            <tr><th scope="row">2일차</th><td>Javascript</td></tr>
        </tbody>
        <tfoot><tr><td colspan="2">총 2일 과정</td></tr></tfoot> <!-- 요약 -->
    </table> <br> <hr> <br>

    <!-- 폼 구성 -->
    <form>
        <label for="username">사용자 이름:</label>
        <input type="text" id="username" name="username" required>

        <label for="fruit">과일 선택:</label>
        <select id="fruit" name="fruit">
            <option value="">-- 과일 선택 --</option>
            <option value="사과" selected>사과</option>
        </select>

        <button type="submit">제출</button>
    </form> <br> <hr> <br>

    <!-- 입력 유효성 검사 -->
    <input class="form-input" id="goal-input" type="text" 
        placeholder="오늘 공부할 내용을 입력하세요" required>
    <!-- 다른 조건 -->
    <input type="email" required>
    <input type="number" min="1" max="10">
    <input type="text" minlength="2" maxlength="20">
    <input type="text" pattern="[0-9]{3}-[0-9]{4}">

    <!-- novalidate : 브라우저 기본 검사를 끄고 js로 직접 검사 옵션-->
    <form class="form" id="goal-form" novalidate> ... </form>

    <!-- 접근성 테스트 -->
    <label class="sr-only" for="goal-input">학습 목표</label>
    <input class="form-input" id="goal-input" type="text"
        placeholder="오늘 공부할 내용을 입력하세요" required>

    <section class="panel" aria-labelledby="=form-title"></section>
    <div class="tab" id="filter-tabs" role="group" aria-label="목록 필터"></div>
    
    
</body>
</html>
